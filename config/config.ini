# OpenClaw 默认配置文件 (Termux 版本)
# 此文件将在安装时复制到 $PREFIX/etc/openclaw/config.ini
# 用户可创建 ~/.openclaw/config.ini 覆盖默认设置

[graphics]
# 显示分辨率（降低以提高性能）
width=1280
height=720
fullscreen=false
vsync=true
texture_quality=high

# 渲染驱动: auto (自动选择), opengles, software
render_driver=auto

[audio]
# 音频设置
enabled=true
music_volume=80
sfx_volume=100
# 音频驱动: auto, opensles (Android默认), alsa
audio_driver=auto

[controls]
# 输入设备启用
touch_enabled=true
keyboard_enabled=true
gamepad_enabled=true

# 触摸配置（百分比位置）
touch_size=15
touch_opacity=200

[performance]
# 性能限制
max_fps=60
# 不使用垂直同步时允许帧率超过显示器刷新率（仅在 PC 有效）
unsynchronized=false

# 动态分辨率缩放（性能极低时可启用）
dynamic_resolution=false

[paths]
# 资源路径（安装时自动设置）
#resources=$PREFIX/share/openclaw

[save]
# 存档设置
autosave=true
autosave_interval=300  # 秒
max_slots=10

[log]
# 日志级别: error, warn, info, debug, trace
level=info
file=$HOME/.openclaw/openclaw.log
max_size_mb=10
max_files=5

[termux]
# Termux 特定设置
# 是否尝试使用 Termux 音量键控制
volume_keys_as_buttons=false

# 启用 Android 返回键作为暂停/返回
back_key_as_pause=true
