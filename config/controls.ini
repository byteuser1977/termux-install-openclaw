# OpenClaw 控制映射配置文件
# 用户可创建 ~/.openclaw/controls.ini 自定义按键

[keyboard]
# 键盘映射 (SDL 键名)
# https://wiki.libsdl.org/SDL_Scancode

# 移动
move_left=LEFT
move_right=RIGHT
move_up=UP
move_down=DOWN

# 动作
jump=SPACE
attack=LCONTROL
special=LALT
start=RETURN
select=ESCAPE
pause=ESC

# 调试（仅调试版本）
debug_toggle=F1
screenshot=F2

[touch]
# 触摸屏按钮布局（屏幕百分比坐标）
# 格式: action=x,y,width,height

# 方向键（虚拟十字键）
up_button=25,75,10,10
down_button=25,85,10,10
left_button=15,80,10,10
right_button=35,80,10,10

# 动作按钮（右侧）
jump_button=75,70,12,12
attack_button=88,70,12,12
special_button=75,85,12,12
start_button=50,95,10,8
select_button=40,95,10,8

# 触摸灵敏度 (像素)
touch_tolerance=10

[gamepad]
# 手柄映射 (SDL 游戏控制器按钮索引)

# 移动 (左摇杆)
move_left=0  # -X
move_right=0 # +X
move_up=0    # -Y
move_down=0  # +Y

# 动作按钮
jump=0       # A / Cross
attack=1     # B / Circle
special=2    # X / Square
start=9      # Start
select=8     # Select

# 肩键
trigger_left=4
trigger_right=5

# 摇杆死区 (0-32767)
joystick_deadzone=8000

[termux]
# Termux 特有控制（音量键）
volume_up=jump
volume_down=attack
# 是否阻止系统音量调整（true=将音量键用于游戏，false=同时调整系统音量）
consume_volume_keys=true
